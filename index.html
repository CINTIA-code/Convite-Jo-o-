<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Roblox</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
font-family:Arial, Helvetica, sans-serif;
}

.convite{

width:400px;
height:700px;

background-image:url("fundo.jpg");
background-size:cover;
background-position:center;

position:relative;

color:white;
text-align:center;

}

/* nome */

.nome{

position:absolute;

top:380px;
width:100%;

font-size:48px;
font-weight:bold;

color:#ff2a2a;

text-shadow:3px 3px 8px black;

}

/* idade */

.idade{

position:absolute;

top:450px;
width:100%;

font-size:32px;
font-weight:bold;

color:#8bd3ff;

text-shadow:2px 2px 6px black;

}

/* frase */

.frase{

position:absolute;

top:510px;

width:80%;
left:10%;

font-size:18px;

font-weight:bold;

text-shadow:2px 2px 6px black;

}

/* data */

.data{

position:absolute;

bottom:120px;

left:50%;

transform:translateX(-50%);

background:#e00000;

padding:15px 35px;

border-radius:10px;

font-size:28px;

font-weight:bold;

box-shadow:0 0 10px rgba(0,0,0,0.6);

}

</style>

</head>

<body>

<div class="convite">

<div class="nome">
João Miguel
</div>

<div class="idade">
7 anos
</div>

<div class="frase">
CONVOCANDO TODOS OS JOGADORES  
PARA COMEMORAR MEU ANIVERSÁRIO!
</div>

<div class="data">
21/03 às 18:00
</div>

</div>

</body>
</html>
