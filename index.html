<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Roblox</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
font-family:Arial, sans-serif;
}

.convite{

width:360px;
height:640px;
background-image:url("roblox-fundo.jpg");
background-size:cover;
background-position:center;
position:relative;
color:white;
text-align:center;

}

.roblox{

position:absolute;
top:20px;
width:100%;
font-size:40px;
font-weight:bold;
letter-spacing:6px;

}

.nome{

position:absolute;
top:270px;
width:100%;
font-size:42px;
color:#ff2a2a;
font-weight:bold;
text-shadow:2px 2px 5px black;

}

.idade{

position:absolute;
top:340px;
width:100%;
font-size:30px;
font-weight:bold;

}

.frase{

position:absolute;
top:400px;
width:80%;
left:10%;
font-size:18px;

}

.data{

position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:red;
padding:15px 25px;
border-radius:10px;
font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="convite">

<div class="roblox">
ROBLOX
</div>

<div class="nome">
João Miguel
</div>

<div class="idade">
7 anos
</div>

<div class="frase">
Convocando todos os jogadores para comemorar meu aniversário!
</div>

<div class="data">
21/03 às 18:00
</div>

</div>

</body>
</html>
