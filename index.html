<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Roblox</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0b1a4a;
font-family:Arial;
}

.convite{

width:360px;
height:640px;
background:linear-gradient(#1a2aff,#020b40);
color:white;
text-align:center;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.6);

}

.roblox{

font-size:40px;
font-weight:bold;
margin-top:10px;

}

.nome{

font-size:38px;
color:#ff2a2a;
font-weight:bold;
margin-top:20px;

}

.idade{

font-size:28px;

}

.frase{

margin-top:20px;
font-size:18px;

}

.data{

background:red;
padding:15px;
margin-top:30px;
border-radius:10px;
font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="convite">

<div class="roblox">ROBLOX</div>

<div class="nome">
João Miguel
</div>

<div class="idade">
7 anos
</div>

<div class="frase">
Convocando todos os jogadores para comemorar meu aniversário!
</div>

<div class="data">
21/03 às 18:00
</div>

</div>

</body>
</html>
